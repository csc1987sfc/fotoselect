<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FotoSelect — Galería Profesional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<script>
// Direct Supabase REST client - no eval, no CDN
const SURL = 'https://urpjnmbhhbzeirktpzcv.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVycGpubWJoaGJ6ZWlya3RwemN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDU3NDQsImV4cCI6MjA5NTIyMTc0NH0.-DFxwerywoeoiOPzErn2PVCCosTKjuUMIVBBdXQ_RNE';

let _session = null;
let _authListeners = [];

function _saveSession(s){ _session=s; if(s) localStorage.setItem('sb_session',JSON.stringify(s)); else localStorage.removeItem('sb_session'); }
function _loadSession(){ if(!_session){ const s=localStorage.getItem('sb_session'); if(s) try{ _session=JSON.parse(s); }catch(e){} } return _session; }
function _notify(event,session){ _authListeners.forEach(cb=>{ try{cb(event,session);}catch(e){} }); }
function _token(){ return _loadSession()?.access_token||SKEY; }

function _headers(extra={}){ return {'apikey':SKEY,'Authorization':`Bearer ${_token()}`,'Content-Type':'application/json',...extra}; }

async function _restGet(table, qs='', opts={}){
  const h = _headers(opts.count?{'Prefer':'count=exact'}:{});
  if(opts.single) h['Accept']='application/vnd.pgrst.object+json';
  try{
    const r = await fetch(`${SURL}/rest/v1/${table}?${qs}`,{method:opts.head?'HEAD':'GET',headers:h});
    if(opts.head||opts.count){ const cr=r.headers.get('content-range'); return {data:null,count:cr?parseInt(cr.split('/')[1]||'0'):0,error:null}; }
    const d = await r.json();
    if(d&&d.code) return {data:null,error:d};
    return {data:d,error:null};
  }catch(e){return {data:null,error:{message:e.message}};}
}

async function _restWrite(method, table, body, filters=''){
  try{
    const r = await fetch(`${SURL}/rest/v1/${table}${filters?'?'+filters:''}`,{method,headers:_headers({'Prefer':'return=representation'}),body:JSON.stringify(body)});
    if(r.status===204) return {data:null,error:null};
    const d = await r.json();
    if(d&&(d.code||d.error)) return {data:null,error:d};
    return {data:d,error:null};
  }catch(e){return {data:null,error:{message:e.message}};}
}

// Auth
const sbAuth = {
  async signUp({email,password,options:{data:meta}={}}){
    try{
      const r = await fetch(`${SURL}/auth/v1/signup`,{method:'POST',headers:{'apikey':SKEY,'Content-Type':'application/json'},body:JSON.stringify({email,password,data:meta||{}})});
      const d = await r.json();
      if(d.error||d.error_description) return {data:null,error:{message:d.error_description||d.error}};
      if(d.access_token){ _saveSession({access_token:d.access_token,user:d.user}); _notify('SIGNED_IN',_session); }
      return {data:{user:d.user},error:null};
    }catch(e){return {data:null,error:{message:e.message}};}
  },
  async signInWithPassword({email,password}){
    try{
      const r = await fetch(`${SURL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'apikey':SKEY,'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const d = await r.json();
      if(d.error||d.error_description) return {data:null,error:{message:d.error_description||d.error||'Credenciales incorrectas'}};
      _saveSession({access_token:d.access_token,refresh_token:d.refresh_token,user:d.user});
      _notify('SIGNED_IN',_session);
      return {data:{user:d.user,session:_session},error:null};
    }catch(e){return {data:null,error:{message:e.message}};}
  },
  async signOut(){ _saveSession(null); _notify('SIGNED_OUT',null); return {error:null}; },
  async getSession(){ _loadSession(); return {data:{session:_session}}; },
  async getUser(){ _loadSession(); return {data:{user:_session?.user||null}}; },
  onAuthStateChange(cb){ _authListeners.push(cb); _loadSession(); if(_session) setTimeout(()=>cb('INITIAL_SESSION',_session),0); return {data:{subscription:{unsubscribe:()=>{ _authListeners=_authListeners.filter(l=>l!==cb); }}}}; }
};

// Query builder
function sbFrom(table){
  const s={table,filters:[],cols:'*',orderCol:null,orderAsc:true,lim:null,isSingle:false,isHead:false,countMode:null};
  const qs=()=>{
    let q=`select=${encodeURIComponent(s.cols)}`;
    s.filters.forEach(f=>{ if(f.t==='eq') q+=`&${f.col}=eq.${encodeURIComponent(f.v)}`; else if(f.t==='in') q+=`&${f.col}=in.(${f.vs.map(v=>encodeURIComponent(v)).join(',')})`; });
    if(s.orderCol) q+=`&order=${s.orderCol}.${s.orderAsc?'asc':'desc'}`;
    if(s.lim) q+=`&limit=${s.lim}`;
    return q;
  };
  const fqs=()=>{ const parts=[]; s.filters.forEach(f=>{ if(f.t==='eq') parts.push(`${f.col}=eq.${encodeURIComponent(f.v)}`); else if(f.t==='in') parts.push(`${f.col}=in.(${f.vs.map(v=>encodeURIComponent(v)).join(',')})`); }); return parts.join('&'); };
  const b={
    select(cols='*',opts={}){ s.cols=cols; if(opts.count) s.countMode=opts.count; if(opts.head) s.isHead=opts.head; return b; },
    eq(col,v){ s.filters.push({t:'eq',col,v}); return b; },
    in(col,vs){ s.filters.push({t:'in',col,vs}); return b; },
    order(col,opts={}){ s.orderCol=col; s.orderAsc=opts.ascending!==false; return b; },
    limit(n){ s.lim=n; return b; },
    single(){ s.isSingle=true; return b; },
    async insert(data){ return _restWrite('POST',s.table,Array.isArray(data)?data:[data]); },
    async update(data){ return _restWrite('PATCH',s.table,data,fqs()); },
    async delete(){ return _restWrite('DELETE',s.table,undefined,fqs()); },
    then(res,rej){ return _restGet(s.table,qs(),{single:s.isSingle,head:s.isHead,count:s.countMode}).then(res,rej); }
  };
  return b;
}

// Main sb object
const sb = { auth: sbAuth, from: sbFrom };
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;
  --surface:#1a1916;
  --surface2:#232119;
  --border:#2e2b24;
  --gold:#c9a96e;
  --gold2:#e8c98a;
  --text:#f0ebe0;
  --muted:#7a7268;
  --accent:#c0392b;
  --r:2px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh}

/* SCREENS */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── AUTH SCREEN ── */
#screen-auth{align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden}
#screen-auth::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,169,110,.08),transparent 70%);
  pointer-events:none;
}
.auth-box{width:100%;max-width:420px;animation:riseIn .7s ease both}
.auth-logo{text-align:center;margin-bottom:48px}
.auth-logo h1{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:400;letter-spacing:0.02em}
.auth-logo h1 span{color:var(--gold);font-style:italic}
.auth-logo p{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:6px}

.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:32px}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
.auth-tab.active{color:var(--gold);border-color:var(--gold)}

.field{margin-bottom:18px}
.field label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--muted)}

.btn-primary{width:100%;background:var(--gold);color:#0f0e0c;border:none;border-radius:var(--r);padding:14px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .15s;margin-top:8px}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.auth-switch{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}
.auth-switch a{color:var(--gold);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

.role-selector{display:flex;gap:10px;margin-bottom:20px}
.role-btn{flex:1;padding:11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--muted);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.role-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.08)}

.err{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#e07060;margin-bottom:16px;display:none}
.err.show{display:block}

/* ── SHARED HEADER ── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:50;
}
.app-logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400}
.app-logo span{color:var(--gold);font-style:italic}
.header-right{display:flex;align-items:center;gap:16px}
.user-badge{font-size:11px;color:var(--muted);letter-spacing:0.06em}
.btn-sm{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm.danger:hover{border-color:var(--accent);color:var(--accent)}

/* ── PHOTOGRAPHER DASHBOARD ── */
#screen-photographer{background:var(--bg)}
.dash-body{max-width:1100px;margin:0 auto;padding:40px 24px}

.dash-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;margin-bottom:8px}
.dash-title em{font-style:italic;color:var(--gold)}
.dash-sub{font-size:12px;color:var(--muted);letter-spacing:0.06em;margin-bottom:40px}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.section-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;font-style:italic}
.btn-gold{background:var(--gold);color:#0f0e0c;border:none;border-radius:var(--r);padding:9px 18px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.btn-gold:hover{background:var(--gold2)}

/* Sessions grid */
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:48px}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:border-color .2s,transform .2s;animation:popIn .3s ease both}
.session-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.session-card h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;margin-bottom:6px}
.session-card p{font-size:11px;color:var(--muted);letter-spacing:0.04em;margin-bottom:14px}
.session-meta{display:flex;gap:12px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.session-meta span{color:var(--gold)}

/* Session detail */
.back-btn{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:28px;transition:color .2s;letter-spacing:0.06em}
.back-btn:hover{color:var(--gold)}

/* Upload zone */
.upload-zone{border:1px dashed var(--border);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;margin-bottom:28px}
.upload-zone:hover,.upload-zone.over{border-color:var(--gold);background:rgba(201,169,110,.04)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone p{font-size:13px;color:var(--muted)}
.upload-zone p u{color:var(--gold);text-decoration-color:var(--gold)}
.upload-zone small{font-size:11px;color:var(--border);margin-top:6px;display:block}

.prog-bar{height:2px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:24px;display:none}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .3s}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.photo-item{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;background:var(--surface);border:1px solid var(--border);animation:popIn .3s ease both}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.photo-item:hover img{transform:scale(1.06)}
.photo-item .del-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:rgba(15,14,12,.75);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s,background .2s}
.photo-item:hover .del-btn{opacity:1}
.photo-item .del-btn:hover{background:var(--accent)}
@media(max-width:600px){.photo-item .del-btn{opacity:1;width:32px;height:32px;font-size:18px}}
.fav-badge{position:absolute;bottom:6px;left:6px;background:var(--gold);color:#0f0e0c;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 7px;border-radius:99px;font-weight:500}

/* Clients table */
.clients-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.clients-table th{text-align:left;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--border)}
.clients-table td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.clients-table tr:last-child td{border-bottom:none}
.clients-table tr:hover td{background:var(--surface2)}
.toggle-password-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 5px;vertical-align:middle;transition:color .2s}
.toggle-password-btn:hover{color:var(--gold)}

/* ── CLIENT SCREEN ── */
#screen-client{background:var(--bg)}
.client-body{max-width:1100px;margin:0 auto;padding:40px 24px}
.client-hero{text-align:center;margin-bottom:48px}
.client-hero h2{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;margin-bottom:8px}
.client-hero h2 em{font-style:italic;color:var(--gold)}
.client-hero p{font-size:12px;color:var(--muted);letter-spacing:0.08em}

.fav-counter{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 18px;font-size:12px;letter-spacing:0.08em;margin-bottom:32px;color:var(--muted)}
.fav-counter strong{color:var(--gold)}

/* Client photo grid */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.client-photo{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .2s;animation:popIn .3s ease both}
.client-photo:hover{transform:scale(1.02)}
.client-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .3s}
.client-photo.favorited{border-color:var(--gold)}
.client-photo.favorited img{filter:brightness(1.05)}
.heart{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;background:rgba(15,14,12,.65);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .2s,transform .2s}
.client-photo:hover .heart{transform:scale(1.1)}
.client-photo.favorited .heart{background:var(--gold);border-color:var(--gold)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px;width:100%;max-width:460px;animation:riseIn .3s ease both;position:relative}
.modal h3{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;margin-bottom:24px}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;transition:color .2s}
.modal-close:hover{color:var(--text)}

/* ADMIN */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:32px}
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.admin-card h3{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:400;font-style:italic;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.code-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.code-item:last-child{border-bottom:none}
.code-badge{font-family:monospace;background:var(--surface2);padding:4px 10px;border-radius:var(--r);font-size:13px;letter-spacing:0.05em;color:var(--gold)}
.code-used{opacity:.4;text-decoration:line-through}
.ph-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.ph-item:last-child{border-bottom:none}
@media(max-width:700px){.admin-grid{grid-template-columns:1fr}}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#lightbox.open{display:flex}
#lb-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:var(--r)}
.lb-close{position:absolute;top:20px;right:24px;background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.lb-close:hover{border-color:var(--gold)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(26,25,22,0.6);border:1px solid var(--border);color:var(--text);width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
.lb-nav:hover{border-color:var(--gold);color:var(--gold)}
#lb-prev{left:24px}
#lb-next{right:24px}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--gold);border-radius:var(--r);padding:10px 22px;font-size:12px;letter-spacing:0.07em;color:var(--gold);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty p{font-size:13px;margin-top:8px}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:12px;letter-spacing:0.1em;text-transform:uppercase}

@keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

@media(max-width:600px){
  .app-header{padding:14px 16px}
  .dash-body,.client-body{padding:24px 16px}
  .photo-grid,.client-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
  .sessions-grid{grid-template-columns:1fr}
  .lb-nav{width:36px;height:36px;font-size:16px}
  #lb-prev{left:12px}
  #lb-next{right:12px}
}
</style>
</head>
<body>

<div id="screen-auth" class="screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>Foto<span>Select</span></h1>
      <p>Galería profesional para fotógrafos</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchTab('register')">Registrarse</div>
    </div>

    <div id="tab-login">
      <div class="role-selector">
        <div class="role-btn active" onclick="setRole('photographer',this)">📷 Fotógrafo</div>
        <div class="role-btn" onclick="setRole('client',this)">👤 Cliente</div>
      </div>
      <div class="err" id="login-err"></div>
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com"/></div>

<script>
// ── CONFIG ──
const CLOUD_NAME  = 'dgp3tlqtq';
const UPLOAD_PRESET = 'fotoselect';
const ADMIN_ID = 'b28dcf3d-7d71-40f2-87f0-148d294b2328'; // Tu ID de administrador

// ── STATE ──
let currentUser = null;
let currentRole = 'photographer'; // 'photographer' | 'client'
let currentSession = null; // for photographer detail view
let dashboardLoaded = false;
let currentClientRow = null; // for client view

// ── TOAST ──
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3000); }

// ── SCREENS ──
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }

// ── AUTH TAB ──
function switchTab(t){
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('tab-login').style.display = t==='login'?'':'none';
  document.getElementById('tab-register').style.display = t==='register'?'':'none';
}
function setRole(r, el){ currentRole=r; document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
function showErr(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function hideErr(id){ document.getElementById(id).classList.remove('show'); }

// ── REGISTER (photographer only) ──
async function handleRegister(){
  hideErr('reg-err');
  const code=document.getElementById('reg-code').value.trim();
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  if(!code||!name||!email||!pass){ showErr('reg-err','Rellena todos los campos'); return; }
  
  const btn=document.querySelector('#tab-register .btn-primary');
  btn.disabled=true; btn.textContent='Verificando código…';
  
  // Validar código de invitación de forma pública
  const {data:invite, error:invErr} = await sb.from('invite_codes').select('*').eq('code', code);
  if(invErr || !invite || invite.length === 0 || invite[0].used){
    btn.disabled=false; btn.textContent='Crear cuenta de fotógrafo';
    showErr('reg-err','El código de invitación no es válido o ya ha sido utilizado.');
    return;
  }
  
  btn.textContent='Creando cuenta…';
  const {data,error} = await sb.auth.signUp({email,password:pass,options:{data:{name,role:'photographer'}}});
  btn.disabled=false; btn.textContent='Crear cuenta de fotógrafo';
  if(error){ showErr('reg-err',error.message); return; }
  
  // Quemar código y actualizar perfil
  await Promise.all([
    sb.from('invite_codes').update({used: true}).eq('id', invite[0].id),
    sb.from('profiles').update({name}).eq('id',data.user.id)
  ]);
  
  toast('¡Cuenta creada! Revisa tu email para confirmarla');
  switchTab('login');
}

// ── LOGIN ──
async function handleLogin(){
  hideErr('login-err');
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){ showErr('login-err','Introduce email y contraseña'); return; }
  const btn=document.querySelector('#tab-login .btn-primary');
  btn.disabled=true; btn.textContent='Entrando…';

  if(currentRole==='photographer'){
    const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
    btn.disabled=false; btn.textContent='Entrar';
    if(error){ showErr('login-err','Email o contraseña incorrectos'); return; }
    currentUser = data.user;
    // Comprobar si la cuenta está activa
    const {data:profile} = await sbFrom('profiles').select('active').eq('id',currentUser.id).single();
    if(profile && profile.active === false){ 
      await sb.auth.signOut();
      currentUser = null;
      showErr('login-err','Tu cuenta ha sido desactivada. Contacta con el administrador.');
      return;
    }
    console.log('Login OK, user id:', currentUser.id, 'admin?', currentUser.id===ADMIN_ID);
    await loadPhotographerDashboard();
  } else {
    // login del cliente
    const {data:clients,error} = await sb.from('clients').select('*').eq('email',email);
    btn.disabled=false; btn.textContent='Entrar';
    if(error||!clients||clients.length===0){ showErr('login-err','Cliente no encontrado'); return; }
    const client = clients.find(c=>c.password_hash===pass);
    if(!client){ showErr('login-err','Contraseña incorrecta'); return; }
    currentClientRow = client;
    await loadClientView();
  }
}

function logout(){
  sb.auth.signOut();
  currentUser=null; currentClientRow=null; currentSession=null; dashboardLoaded=false;
  showScreen('auth');
}

// ══════════════════════════════════
// ADMIN PANEL
// ══════════════════════════════════
async function renderAdminPanel(){
  const body = document.getElementById('admin-body');
  body.innerHTML = '<div class="loading">Cargando panel…</div>';
  const [{data:codes},{data:photographers}] = await Promise.all([
    sbFrom('invite_codes').select('*').order('created_at',{ascending:false}),
    sbFrom('profiles').select('*').order('created_at',{ascending:false})
  ]);

  let codesHtml = '';
  (codes||[]).forEach(c=>{
    codesHtml += `<div class="code-item ${c.used?'code-used':''}">
      <span class="code-badge">${escHtml(c.code)}</span>
      <span style="font-size:11px;color:var(--muted)">${c.email||'Sin email'}</span>
      <span style="font-size:11px;color:${c.used?'var(--muted)':'var(--gold)'}">${c.used?'Usado':'Disponible'}</span>
      <button class="btn-sm danger" onclick="deleteCode('${c.id}')">×</button>
    </div>`;
  });

  let phHtml = '';
  (photographers||[]).filter(p=>p.id!==ADMIN_ID).forEach(p=>{
    const isActive = p.active !== false;
    phHtml += `<div class="ph-item">
      <div>
        <div style="font-weight:500">${escHtml(p.name||'Sin nombre')} ${!isActive?'<span style="color:var(--accent);font-size:10px;letter-spacing:0.1em">DESACTIVADO</span>':''}</div>
        <div style="font-size:11px;color:var(--muted)">${escHtml(p.email||'')}</div>
      </div>
      <div style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px">
        <span>${new Date(p.created_at).toLocaleDateString('es-ES')}</span>
        ${isActive 
          ? `<button class="btn-sm danger" onclick="deletePhotographer('${p.id}')">Desactivar</button>`
          : `<button class="btn-gold" style="font-size:10px;padding:5px 12px" onclick="activatePhotographer('${p.id}')">Activar</button>`
        }
        <button class="btn-sm danger" style="padding:6px 10px;font-size:13px" onclick="eliminarFotografoPorCompleto('${p.id}','${escHtml(p.email||'')}')" title="Borrar permanentemente">🗑️</button>
      </div>
    </div>`;
  });

  body.innerHTML = `
    <div class="back-btn" onclick="loadPhotographerDashboard()">← Volver al estudio</div>
    <h2 class="dash-title">Panel de <em>administración</em></h2>
    <p class="dash-sub">Gestiona fotógrafos y códigos de acceso</p>
    <div class="admin-grid">
      <div class="admin-card">
        <h3>Códigos de invitación</h3>
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <input type="text" id="new-code-email" class="search-input" placeholder="Email del fotógrafo (opcional)" style="flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:8px; outline:none; font-family:inherit; font-size:13px;"/>
          <button class="btn-gold" onclick="generateCode()">+ Generar</button>
        </div>
        ${codesHtml||'<p style="color:var(--muted);font-size:12px">No hay códigos aún</p>'}
      </div>
      <div class="admin-card">
        <h3>Fotógrafos registrados</h3>
        ${phHtml||'<p style="color:var(--muted);font-size:12px">No hay fotógrafos aún</p>'}
      </div>
    </div>`;
}

function generateRandomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';
  for(let i=0;i<8;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

async function generateCode(){
  const email = document.getElementById('new-code-email').value.trim();
  const code = generateRandomCode();
  await sbFrom('invite_codes').insert({code, email:email||null, used:false});
  toast(`Código ${code} creado ✓`);
  renderAdminPanel();
}

async function deleteCode(id){
  if(!confirm('¿Eliminar este código?')) return;
  await sbFrom('invite_codes').eq('id',id).delete();
  toast('Código eliminado');
  await new Promise(r=>setTimeout(r,400));
  renderAdminPanel();
}

async function deletePhotographer(id){
  if(!confirm('¿Desactivar este fotógrafo? No podrá entrar en la app.')) return;
  await sbFrom('profiles').eq('id',id).update({active: false});
  toast('Fotógrafo desactivado ✓');
  await new Promise(r=>setTimeout(r,400));
  renderAdminPanel();
}

async function activatePhotographer(id){
  await sbFrom('profiles').eq('id',id).update({active: true});
  toast('Fotógrafo activado ✓');
  await new Promise(r=>setTimeout(r,400));
  renderAdminPanel();
}

// BORRADO FULMINANTE DESDE PANEL ADMIN
async function eliminarFotografoPorCompleto(id, email) {
  if(!confirm(`⚠️ ¿ESTÁS SEGURO? \nEsto eliminará permanentemente al fotógrafo (${email}) junto con todas sus sesiones, clientes y fotos de la base de datos AL INSTANTE.`)) return;
  const reconfirmar = prompt(`Para confirmar el borrado definitivo, escribe la palabra "ELIMINAR":`);
  if (reconfirmar !== "ELIMINAR") { alert("Confirmación incorrecta. Acción cancelada."); return; }
  
  // 1. Conseguir todas las sesiones de este fotógrafo para borrar favoritos en cascada manual
  const {data: sses} = await sbFrom('sessions').select('id').eq('photographer_id', id);
  if(sses && sses.length > 0){
    const sIds = sses.map(s => s.id);
    const {data: cls} = await sbFrom('clients').select('id').in('session_id', sIds);
    if(cls && cls.length > 0){
       await sbFrom('favorites').in('client_id', cls.map(c => c.id));
    }
    await sbFrom('clients').in('session_id', sIds).delete();
    await sbFrom('photos').in('session_id', sIds).delete();
    await sbFrom('sessions').in('session_id', sIds).delete();
  }
  
  // 2. Eliminar el perfil definitivo
  await sbFrom('profiles').eq('id', id).delete();
  toast('Fotógrafo eliminado por completo ✓');
  await new Promise(r=>setTimeout(r,400));
  renderAdminPanel();
}

// ── CHECK SESSION ON LOAD ──
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session){ 
    currentUser=session.user; 
    console.log('Session restored, user id:', currentUser.id, 'admin?', currentUser.id===ADMIN_ID);
    await loadPhotographerDashboard(); 
  } else {
    showScreen('auth');
  }
})();

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='TOKEN_REFRESHED'&&session){
    currentUser=session.user;
  }
});

// ══════════════════════════════════
// PHOTOGRAPHER DASHBOARD
// ══════════════════════════════════
async function loadPhotographerDashboard(){
  showScreen('photographer');
  const {data:profile} = await sb.from('profiles').select('name').eq('id',currentUser.id).single();
  document.getElementById('ph-user-badge').textContent = profile?.name || currentUser.email;
  
  setTimeout(()=>{ 
    const btn=document.getElementById('admin-btn'); 
    if(btn && currentUser && currentUser.id.trim()===ADMIN_ID.trim()) btn.style.display=''; 
  }, 100);

  currentSession = null;
  renderSessionsList();
}

async function renderSessionsList(){
  const body = document.getElementById('ph-body');
  body.innerHTML = '<div class="loading">Cargando sesiones…</div>';

  const {data:sessions, error} = await sb.from('sessions')
    .select('*, photos(id), clients(id)')
    .eq('photographer_id',currentUser.id)
    .order('created_at',{ascending:false});

  const isAdmin = currentUser && currentUser.id.trim()===ADMIN_ID.trim();
  let html = `
    <h2 class="dash-title">Tu <em>estudio</em></h2>
    <p class="dash-sub">Gestiona tus sesiones y clientes</p>
    ${isAdmin ? `<div style="margin-bottom:20px"><button class="btn-gold" onclick="showScreen('admin');renderAdminPanel()" style="background:transparent;border:1px solid var(--gold);color:var(--gold)">⚙ Panel de administración</button></div>` : ''}
    <div class="section-header">
      <span class="section-title">Sesiones fotográficas</span>
      <button class="btn-gold" onclick="openNewSessionModal()">+ Nueva sesión</button>
    </div>`;

  if(!sessions||sessions.length===0){
    html += '<div class="empty"><p style="font-size:2rem">📷</p><p>Aún no tienes sesiones. Crea la primera.</p></div>';
  } else {
    html += '<div class="sessions-grid">';
    for(const s of sessions){
      const photoCount = s.photos ? s.photos.length : 0;
      const clientCount = s.clients ? s.clients.length : 0;
      html += `
        <div class="session-card" onclick="openSession('${s.id}','${escHtml(s.name)}')">
          <h3>${escHtml(s.name)}</h3>
          <p>${escHtml(s.description||'Sin descripción')}</p>
          <div class="session-meta">
            <div><span>${photoCount}</span> fotos</div>
            <div><span>${clientCount}</span> clientes</div>
            <div style="margin-left:auto"><button class="btn-sm danger" onclick="event.stopPropagation();deleteSession('${s.id}','${escHtml(s.name)}')" style="font-size:10px;padding:4px 10px">Eliminar</button></div>
          </div>
        </div>`;
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

async function deleteSession(id, name){
  if(!confirm('¿Eliminar la sesión "'+name+'" y todas sus fotos y clientes?')) return;
  const {data:cls} = await sbFrom('clients').select('id').eq('session_id',id);
  if(cls && cls.length > 0){
     await sbFrom('favorites').in('client_id', cls.map(c=>c.id));
  }
  await sbFrom('clients').eq('session_id',id).delete();
  await sbFrom('photos').eq('session_id',id).delete();
  await sbFrom('sessions').eq('id',id).delete();
  await new Promise(r=>setTimeout(r,400));
  toast('Sesión eliminada ✓');
  renderSessionsList();
}

async function copiarParaLightroom(){
  const {data:clients} = await sbFrom('clients').select('id').eq('session_id', currentSession.id);
  if(!clients||clients.length===0){ toast('No hay clientes en esta sesión'); return; }
  
  const clientIds = clients.map(c=>c.id);
  const {data:allFavs} = await sbFrom('favorites').select('photo_id').in('client_id', clientIds);
  
  if(!allFavs||allFavs.length===0){ toast('No hay fotos favoritas aún'); return; }
  
  const photoIds = [...new Set(allFavs.map(f=>f.photo_id))];
  const {data:photos} = await sbFrom('photos').select('filename').in('id', photoIds);
  
  const names = (photos||[]).map(p=>p.filename||p.url?.split('/').pop()).filter(Boolean).join(', ');
  
  try{
    await navigator.clipboard.writeText(names);
    toast('¡Nombres copiados al portapapeles! (' + photoIds.length + ' fotos)');
  }catch(e){
    prompt('Copia estos nombres:', names);
  }
}

async function openSession(id, name){
  currentSession = {id, name};
  renderSessionDetail();
}

function togglePasswordVisibility(btn, spanId) {
  const span = document.getElementById(spanId);
  if (span.dataset.hidden === "true") {
    span.textContent = span.dataset.password;
    span.dataset.hidden = "false";
    btn.textContent = "👁️‍🗨️";
  } else {
    span.textContent = "••••••••";
    span.dataset.hidden = "true";
    btn.textContent = "👁️";
  }
}

async function renderSessionDetail(){
  const body = document.getElementById('ph-body');
  body.innerHTML = '<div class="loading">Cargando sesión…</div>';

  const [{data:photos},{data:clients}] = await Promise.all([
    sb.from('photos').select('*').eq('session_id',currentSession.id).order('created_at',{ascending:false}),
    sb.from('clients').select('*').eq('session_id',currentSession.id)
  ]);

  const photoIds = (photos||[]).map(p=>p.id);
  let favMap = {};
  
  if(photoIds.length > 0){
    const {data:favs} = await sb.from('favorites').select('photo_id, client_id, clients(name)').in('photo_id', photoIds);
    (favs||[]).forEach(f=>{ 
      if(!favMap[f.photo_id]) favMap[f.photo_id]=[]; 
      if(f.clients) favMap[f.photo_id].push(f.clients.name);
    });
  }

  let html = `
    <div class="back-btn" onclick="renderSessionsList()">← Volver a sesiones</div>
    <h2 class="dash-title"><em>${escHtml(currentSession.name)}</em></h2>
    <p class="dash-sub" style="margin-bottom:32px">${(photos||[]).length} fotos · ${(clients||[]).length} clientes</p>

    <div class="upload-zone" id="upload-zone" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="handleDrop(event)">
      <input type="file" accept="image/*" multiple onchange="handleFiles(this.files)"/>
      <p>📤 Arrastra fotos o <u>haz clic para subir</u></p>
      <small>JPG, PNG, WEBP · Las fotos se suben a Cloudinary</small>
    </div>
    <div class="prog-bar" id="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>

    <div class="section-header">
      <span class="section-title">Fotos de la sesión</span>
    </div>`;

  if(!photos||photos.length===0){
    html += '<div class="empty"><p>Aún no hay fotos en esta sesión.</p></div>';
  } else {
    html += '<div class="photo-grid">';
    for(const p of photos){
      const favNames = favMap[p.id];
      html += `<div class="photo-item">
        <img src="${p.url}" alt="${escHtml(p.filename||'')}" onclick="openLightboxOnly('${p.url}')" loading="lazy"/>
        ${favNames && favNames.length > 0 ? `<div class="fav-badge">❤ ${escHtml(favNames.join(', '))}</div>` : ''}
        <button class="del-btn" onclick="deletePhoto('${p.id}','${p.url}')">×</button>
      </div>`;
    }
    html += '</div>';
  }

  // CLIENTS
  html += `
    <div class="section-header" style="margin-top:48px">
      <span class="section-title">Clientes con acceso</span>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" onclick="copiarParaLightroom()" title="Copia los nombres de fotos favoritas al portapapeles">📋 Copiar para Lightroom</button>
        <button class="btn-gold" onclick="openNewClientModal()">+ Añadir cliente</button>
      </div>
    </div>`;

  if(!clients||clients.length===0){
    html += '<div class="empty"><p>Ningún cliente tiene acceso aún.</p></div>';
  } else {
    html += '<table class="clients-table"><thead><tr><th>Nombre</th><th>Email</th><th>Contraseña</th><th>Favoritas</th><th>Estado</th><th></th></tr></thead><tbody>';
    for(const c of clients){
      const {count:favCount} = await sb.from('favorites').select('*',{count:'exact',head:true}).eq('client_id',c.id);
      const spanId = `pwd-${c.id}`;
      html += `<tr>
        <td>${escHtml(c.name)}</td>
        <td>${escHtml(c.email)}</td>
        <td style="font-family:monospace;font-size:12px;color:var(--muted)">
          <span id="${spanId}" data-password="${escHtml(c.password_hash)}" data-hidden="true">••••••••</span>
          <button class="toggle-password-btn" onclick="togglePasswordVisibility(this, '${spanId}')">👁️</button>
        </td>
        <td><span style="color:var(--gold)">${favCount||0}</span> fotos</td>
        <td>${c.selection_done ? '<span style="color:var(--gold);font-size:11px">✓ Finalizado</span>' : '<span style="color:var(--muted);font-size:11px">Pendiente</span>'}</td>
        <td><button class="btn-sm danger" onclick="deleteClient('${c.id}')">Eliminar</button></td>
      </tr>`;
    }
    html += '</tbody></table>';
  }

  body.innerHTML = html;
}

// ── UPLOAD TO CLOUDINARY ──
async function compressImage(file, maxPx=2000, quality=0.80){
  return new Promise((resolve)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let {width:w, height:h} = img;
      if(w>maxPx||h>maxPx){
        if(w>h){ h=Math.round(h*maxPx/w); w=maxPx; }
        else{ w=Math.round(w*maxPx/h); h=maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(new File([blob],file.name,{type:'image/jpeg'})),'image/jpeg',quality);
    };
    img.src=url;
  });
}

async function uploadToCloudinary(file){
  const compressed = await compressImage(file);
  const fd = new FormData();
  fd.append('file', compressed);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('folder', `fotoselect/${currentSession.id}`);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {method:'POST',body:fd});
  if(!res.ok) throw new Error('Error subiendo a Cloudinary');
  const data = await res.json();
  return {url: data.secure_url, filename: file.name};
}

async function handleFiles(files){
  const arr = [...files].filter(f=>f.type.startsWith('image/'));
  if(!arr.length) return;
  const bar = document.getElementById('prog-bar');
  const fill = document.getElementById('prog-fill');
  bar.style.display='block';
  let done=0;
  for(const f of arr){
    try{
      const {url, filename} = await uploadToCloudinary(f);
      await sbFrom('photos').insert({session_id:currentSession.id, url, filename});
    }catch(e){ toast('Error subiendo '+f.name); }
    done++;
    fill.style.width=(done/arr.length*100)+'%';
  }
  setTimeout(()=>{ bar.style.display='none'; fill.style.width='0%'; },400);
  toast(`${arr.length} foto${arr.length>1?'s':''} subida${arr.length>1?'s':''} ✓`);
  renderSessionDetail();
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('over');
  handleFiles(e.dataTransfer.files);
}

async function deletePhoto(id, url){
  if(!confirm('¿Eliminar esta foto?')) return;
  await sbFrom('favorites').eq('photo_id', id).delete();
  await fetch(`${SURL}/rest/v1/photos?id=eq.${id}`, {
    method: 'DELETE',
    headers: {'apikey': SKEY, 'Authorization': `Bearer ${_token()}`}

async function renderClientGallery(){
  const body = document.getElementById('cl-body');
  body.innerHTML = '<div class="loading">Cargando tus fotos…</div>';

  const [{data:photos},{data:favs},{data:session}] = await Promise.all([
    sb.from('photos').select('*').eq('session_id',currentClientRow.session_id).order('created_at',{ascending:false}),
    sb.from('favorites').select('photo_id').eq('client_id',currentClientRow.id),
    sb.from('sessions').select('name,description').eq('id',currentClientRow.session_id).single()
  ]);

  const favSet = new Set((favs||[]).map(f=>f.photo_id));

  let html = `
    <div class="client-hero">
      <h2>Hola, <em>${escHtml(currentClientRow.name)}</em></h2>
      <p>${escHtml(session?.name||'')} ${session?.description ? '· '+escHtml(session.description) : ''}</p>
    </div>
    <div style="text-align:center;margin-bottom:24px">
      <div class="fav-counter" id="fav-counter-box">❤ Has seleccionado <strong id="fav-count-num">${favSet.size}</strong> de ${(photos||[]).length} fotos</div>
      ${currentClientRow.selection_done ? 
        `<div style="margin-top:12px;color:var(--gold);font-size:13px;letter-spacing:0.06em">✓ Selección finalizada</div>` :
        `<button class="btn-primary" id="btn-finalizar" onclick="finalizarSeleccion()" style="margin-top:16px;max-width:280px;margin-left:auto;margin-right:auto;display:block">Finalizar selección</button>`
      }
    </div>
    <div class="client-grid">`;

  for(const p of (photos||[])){
    const isFav = favSet.has(p.id);
    html += `<div class="client-photo ${isFav?'favorited':''}" id="cp-${p.id}">
      <img src="${p.url}" alt="" loading="lazy" onclick="openClientLightbox('${p.id}')" style="cursor:zoom-in"/>
      <div class="heart" onclick="toggleFav('${p.id}')" title="${isFav?'Quitar de favoritas':'Añadir a favoritas'}">${isFav?'❤':'🤍'}</div>
    </div>`;
  }
  html += '</div>';
  body.innerHTML = html;
}

// Client lightbox
let clientPhotos = [];
let clientLbIndex = 0;

function openClientLightbox(photoId){
  const cards = document.querySelectorAll('.client-photo');
  clientPhotos = [...cards].map(c=>({
    id: c.id.replace('cp-',''),
    url: c.querySelector('img').src
  }));
  clientLbIndex = clientPhotos.findIndex(p=>p.id===photoId);
  showClientLb();
  document.getElementById('lb-prev').style.display = '';
  document.getElementById('lb-next').style.display = '';
  document.getElementById('lightbox').classList.add('open');
}

function showClientLb(){
  if(!clientPhotos.length) return;
  clientLbIndex = ((clientLbIndex%clientPhotos.length)+clientPhotos.length)%clientPhotos.length;
  document.getElementById('lb-img').src = clientPhotos[clientLbIndex].url;
}

document.getElementById('lb-prev').addEventListener('click',(e)=>{ e.stopPropagation(); clientLbIndex--; showClientLb(); });
document.getElementById('lb-next').addEventListener('click',(e)=>{ e.stopPropagation(); clientLbIndex++; showClientLb(); });

// CLIENTE FINALIZA SELECCIÓN Y SE LIMPIA EL ESPACIO SOBRANTE AL INSTANTE
async function finalizarSeleccion(){
  const seguro = confirm("¿Estás completamente seguro de finalizar? Las fotos NO seleccionadas se eliminarán permanentemente de la galería en este mismo instante para procesar tu pedido.");
  if (!seguro) return;

  const btn = document.getElementById('btn-finalizar');
  if(btn) { btn.disabled = true; btn.textContent = 'Procesando selección y limpiando galería…'; }

  try {
    // 1. Conseguir fotos marcadas como favoritas por este cliente
    const {data: favs} = await sb.from('favorites').select('photo_id').eq('client_id', currentClientRow.id);
    const idsElegidos = (favs||[]).map(f => f.photo_id);

    if (idsElegidos.length === 0) {
      alert("Debes seleccionar al menos una foto favorita antes de poder dar por finalizada la selección.");
      if(btn) { btn.disabled = false; btn.textContent = 'Finalizar selección'; }
      return;
    }

    // 2. Borrar de la tabla 'photos' las que NO estén en la lista de elegidas para esta sesión concreta
    await sb.from('photos').delete().eq('session_id', currentClientRow.session_id).not('id', 'in', `(${idsElegidos.join(',')})`);

    // 3. Marcar cliente como finalizado
    await fetch(`${SURL}/rest/v1/clients?id=eq.${currentClientRow.id}`, {
      method: 'PATCH',
      headers: {'apikey': SKEY, 'Authorization': `Bearer ${_token()}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({selection_done: true, selection_done_at: new Date().toISOString()})
    });

    currentClientRow.selection_done = true;
    toast('¡Selección procesada y espacio liberado con éxito!');
    renderClientGallery();

  } catch (e) {
    console.error(e);
    alert("Hubo un contratiempo al procesar tu selección. Por favor, inténtalo de nuevo.");
    if(btn) { btn.disabled = false; btn.textContent = 'Finalizar selección'; }
  }
}

async function toggleFav(photoId){
  const favs = await sbFrom('favorites').select('id').eq('client_id',currentClientRow.id).eq('photo_id',photoId);
  const card = document.getElementById('cp-'+photoId);
  const heart = card.querySelector('.heart');

  if(favs.data&&favs.data.length>0){
    await sbFrom('favorites').eq('id',favs.data[0].id).delete();
    card.classList.remove('favorited');
    heart.textContent='🤍';
    toast('Eliminada de favoritas');
  } else {
    await sbFrom('favorites').insert({client_id:currentClientRow.id, photo_id:photoId});
    card.classList.add('favorited');
    heart.textContent='❤';
    toast('¡Añadida a favoritas!');
  }
  const newFavs = await sbFrom('favorites').select('photo_id').eq('client_id',currentClientRow.id);
  const counter = document.getElementById('fav-count-num');
  if(counter) counter.textContent = (newFavs.data||[]).length;
}

// ── LIGHTBOX ──
function openLightboxOnly(url){ 
  document.getElementById('lb-img').src=url; 
  document.getElementById('lb-prev').style.display = 'none';
  document.getElementById('lb-next').style.display = 'none';
  document.getElementById('lightbox').classList.add('open'); 
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown',e=>{ 
  if(e.key==='Escape') closeLightbox(); 
  if(document.getElementById('lightbox').classList.contains('open') && document.getElementById('lb-prev').style.display !== 'none') {
    if(e.key==='ArrowLeft') { clientLbIndex--; showClientLb(); }
    if(e.key==='ArrowRight') { clientLbIndex++; showClientLb(); }
  }
});

// ── MODALS ──
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));

// ── UTILS ──
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
